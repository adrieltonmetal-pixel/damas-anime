<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Anime PRO</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:Arial; }
#board { display:grid; grid-template-columns:repeat(8,1fr); max-width:400px; margin:auto; }
.cell { aspect-ratio:1; }
.dark { background:#444; }
.light { background:#ccc; }
.piece { width:80%; height:80%; border-radius:50%; margin:auto; margin-top:10%; }
.p1 { background:red; }
.p2 { background:blue; }
.king { border:3px solid gold; }
.selected { outline:3px solid yellow; }
</style>
</head>

<body>

<h2 id="turn">Turno: Vermelho</h2>
<div id="board"></div>
<button onclick="resetGame()">Reiniciar</button>

<script>

let board = [];
let selected = null;
let turn = 1;

function init(){
  board = Array(8).fill().map(()=>Array(8).fill(0));

  for(let y=0;y<3;y++){
    for(let x=0;x<8;x++){
      if((x+y)%2) board[y][x]=2;
    }
  }

  for(let y=5;y<8;y++){
    for(let x=0;x<8;x++){
      if((x+y)%2) board[y][x]=1;
    }
  }

  draw();
}

function draw(){
  const b=document.getElementById("board");
  b.innerHTML="";

  board.forEach((row,y)=>{
    row.forEach((cell,x)=>{
      const div=document.createElement("div");
      div.className="cell "+((x+y)%2?"dark":"light");
      div.onclick=()=>clickCell(x,y);

      if(cell){
        const p=document.createElement("div");
        p.className="piece "+(Math.abs(cell)==1?"p1":"p2");

        if(Math.abs(cell)==3) p.classList.add("king");

        if(selected && selected.x==x && selected.y==y){
          p.classList.add("selected");
        }

        div.appendChild(p);
      }

      b.appendChild(div);
    });
  });

  document.getElementById("turn").innerText =
    "Turno: "+(turn==1?"Vermelho":"Azul");
}

function clickCell(x,y){
  if(selected){
    move(selected.x,selected.y,x,y);
  } else if(Math.abs(board[y][x])==turn){
    selected={x,y};
  }
  draw();
}

function getDirections(piece){
  if(Math.abs(piece)==3) return [[1,1],[-1,1],[1,-1],[-1,-1]];
  return piece==1 ? [[-1,-1],[1,-1]] : [[-1,1],[1,1]];
}

function hasCapture(player){
  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      if(Math.abs(board[y][x])==player && getCaptures(x,y).length){
        return true;
      }
    }
  }
  return false;
}

function getCaptures(x,y){
  let moves=[];
  let piece=board[y][x];
  let dirs=getDirections(piece);

  for(let [dx,dy] of dirs){
    let nx=x+dx, ny=y+dy;
    let jumped=false;

    while(board[ny] && board[ny][nx]!==undefined){
      if(board[ny][nx]==0){
        if(jumped) moves.push({x:nx,y:ny});
        if(Math.abs(piece)!=3) break;
      }
      else if(Math.abs(board[ny][nx])!=Math.abs(piece)){
        if(jumped) break;
        jumped=true;
      }
      else break;

      nx+=dx;
      ny+=dy;
    }
  }

  return moves;
}

function move(x1,y1,x2,y2){
  let piece=board[y1][x1];
  let captures=getCaptures(x1,y1);
  let mustCapture=hasCapture(turn);

  let dx=Math.sign(x2-x1);
  let dy=Math.sign(y2-y1);

  // Movimento simples
  if(!mustCapture && board[y2][x2]==0){
    if(Math.abs(piece)==3){
      board[y2][x2]=piece;
      board[y1][x1]=0;
      promote(x2,y2);
      nextTurn();
    } else {
      if(Math.abs(x2-x1)==1 && Math.abs(y2-y1)==1){
        board[y2][x2]=piece;
        board[y1][x1]=0;
        promote(x2,y2);
        nextTurn();
      }
    }
  }

  // Captura
  for(let move of captures){
    if(move.x==x2 && move.y==y2){
      let cx=x1, cy=y1;

      while(cx!=x2 || cy!=y2){
        cx+=dx;
        cy+=dy;

        if(board[cy][cx] && Math.abs(board[cy][cx])!=Math.abs(piece)){
          board[cy][cx]=0;
          break;
        }
      }

      board[y2][x2]=piece;
      board[y1][x1]=0;

      promote(x2,y2);

      if(getCaptures(x2,y2).length){
        selected={x:x2,y:y2};
        return;
      }

      nextTurn();
    }
  }

  selected=null;
}

function promote(x,y){
  if(board[y][x]==1 && y==0) board[y][x]=3;
  if(board[y][x]==2 && y==7) board[y][x]=3;
}

function nextTurn(){
  turn = turn==1?2:1;
}

function resetGame(){
  turn=1;
  selected=null;
  init();
}

init();

</script>

</body>
</html>
