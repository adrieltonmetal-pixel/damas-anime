<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔥 SUA CONFIG (já está certa)
const firebaseConfig = {
  apiKey: "AIzaSyCsbx1BycA4xyLntIWmJmOc55f9oNi_Lm4",
  authDomain: "damas-online-1e0db.firebaseapp.com",
  databaseURL: "https://damas-online-1e0db-default-rtdb.firebaseio.com",
  projectId: "damas-online-1e0db",
  storageBucket: "damas-online-1e0db.firebasestorage.app",
  messagingSenderId: "309855942741",
  appId: "1:309855942741:web:8033cc2839fc4b6a397cdc"
};

// 🔥 INICIAR
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🧠 VARIÁVEIS
let board = [];
let selected = null;
let turn = 1;

let roomId = null;
let player = null;

// 🧩 TABULEIRO
function initBoard(){
  board = [];
  for(let y=0;y<8;y++){
    board[y]=[];
    for(let x=0;x<8;x++){
      if(y<3 && (x+y)%2) board[y][x]=2;
      else if(y>4 && (x+y)%2) board[y][x]=1;
      else board[y][x]=0;
    }
  }
}

// 🎨 DESENHAR
function draw(){
  let el = document.getElementById("board");
  el.innerHTML="";

  document.getElementById("turnText").innerText =
    player == turn ? "Seu turno" : "Turno do adversário";

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      let cell = document.createElement("div");
      cell.className = "cell " + ((x+y)%2 ? "dark":"light");

      cell.onclick = ()=>clickCell(x,y);

      let piece = board[y][x];

      if(piece){
        let p = document.createElement("div");
        p.className = "piece " + (piece==1?"p1":"p2");
        cell.appendChild(p);
      }

      el.appendChild(cell);
    }
  }
}

// 🖱️ CLICK
function clickCell(x,y){
  if(player !== turn) return;

  if(selected){
    move(selected.x,selected.y,x,y);
    selected=null;
  } else {
    if(board[y][x]==player){
      selected={x,y};
    }
  }

  draw();
}

// 🔁 MOVER
function move(x1,y1,x2,y2){
  board[y2][x2] = board[y1][x1];
  board[y1][x1] = 0;

  nextTurn();
}

// 🔄 TURNO
function nextTurn(){
  turn = turn==1?2:1;

  set(ref(db, "rooms/" + roomId), {
    board: board,
    turn: turn
  });
}

// 👂 ESCUTAR
function listenRoom(){
  onValue(ref(db, "rooms/" + roomId), snapshot=>{
    let data = snapshot.val();
    if(data){
      board = data.board;
      turn = data.turn;
      draw();
    }
  });
}

// 👥 CRIAR SALA
window.createRoom = function(){
  initBoard();

  roomId = Math.random().toString(36).substr(2,5);
  player = 1;

  set(ref(db, "rooms/" + roomId), {
    board: board,
    turn: 1
  });

  alert("Código da sala: " + roomId);

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  listenRoom();
}

// 🔑 ENTRAR
window.joinRoom = function(){
  roomId = prompt("Digite o código:");
  player = 2;

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  listenRoom();
}

</script>
